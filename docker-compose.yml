version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ghc
      POSTGRES_PASSWORD: ghc_password
      POSTGRES_DB: ghc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DATABASE_URL: postgresql://ghc:ghc_password@postgres:5432/ghc
      JWT_SECRET: change_me
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
      GITEA_URL: http://gitea:3000
      GITEA_ADMIN_USER: gituser
      GITEA_ADMIN_PASSWORD: gitpass
    depends_on:
      - postgres
      - gitea
    ports:
      - "4000:4000"

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

  gitea:
    image: gitea/gitea:1.22.5
    environment:
      USER_UID: 1000
      USER_GID: 1000
    volumes:
      - gitea-data:/data
    ports:
      - "3001:3000"
      - "222:22"

volumes:
  pgdata:
  gitea-data:
